name: collect

# Nightly data collection. Collector v1 was verified against the 2026-07-09
# seed on 2026-07-18 — coverage and orphans reproduced exactly; computed
# staleness/drift supersede the hand-set seed values (see README).
on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Run collector
        run: python3 collector/collect.py
      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: collection $(date -u +%F)"
          git push
  # Pushes made with GITHUB_TOKEN don't trigger the publish workflow,
  # so redeploy Pages here after committing fresh data.
  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Assemble site
        run: |
          mkdir dist
          cp site/* dist/
          cp -r data dist/data
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
