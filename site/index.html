<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QuantEcon Translations — program status</title>
<meta name="description" content="Translation progress across the QuantEcon lecture series: coverage, freshness and automation for every language edition.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>">
<script>try{var t=localStorage.getItem("st-theme");if(t==="light"||t==="dark")document.documentElement.dataset.theme=t}catch(e){}</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <header id="chrome"></header>
  <main id="main"></main>
  <footer id="foot"></footer>
</div>
<div id="tip" role="presentation"></div>

<script src="app.js"></script>
<script>
"use strict";
const { esc, gh } = STDash;

function render(DATA) {
  const activeSources = DATA.sources.filter(s => !s.phase);
  const activeEditions = activeSources.flatMap(s => s.editions.map(e => ({ ...e, src: s })));

  /* ---- tiles ---- */
  /* Headline is org-level: every edition (live or planned) targets its full
     source series, so a lecture translated into three languages counts three
     times — and the planned series widen the denominator. */
  const totTranslated = DATA.sources.reduce((n, s) =>
    n + s.editions.reduce((m, e) => m + (e.lectures_translated || 0), 0), 0);
  const totTarget = DATA.sources.reduce((n, s) => n + s.lectures_total * s.editions.length, 0);
  const pct = Math.round(100 * totTranslated / totTarget);
  const uniqTotal = DATA.sources.reduce((n, s) => n + s.lectures_total, 0);
  const uniqAny = DATA.sources.reduce((n, s) =>
    n + Math.max(0, ...s.editions.map(e => e.lectures_translated || 0)), 0);
  const plannedN = DATA.sources.flatMap(s => s.editions).filter(e => e.planned).length;
  const automated = activeEditions.filter(e => e.automation.wired).length;
  const current = activeEditions.filter(e => e.stale === 0).length;
  const langs = new Set(activeEditions.map(e => e.lang)).size;

  const tiles = `<section aria-label="Program summary"><div class="tiles">
    <div class="tile">
      <span class="label">Lecture translations · whole catalogue</span>
      <span class="value">${totTranslated} <small>/ ${totTarget} · ${pct}%</small></span>
      <span class="note"><b>${uniqAny} / ${uniqTotal}</b> source lectures have ≥ 1 translation · <b>${activeEditions.length} live</b> + ${plannedN} planned editions · ${langs} languages</span>
      <div class="meter" role="img" aria-label="${pct}% of targeted lecture translations delivered, planned series included"><i style="width:${pct}%"></i></div>
    </div>
    <div class="tile">
      <span class="label">Pairs fully automated</span>
      <span class="value">${automated} <small>/ ${activeEditions.length}</small></span>
      <span class="note">sync + AI review + rebase, end to end</span>
    </div>
    <div class="tile">
      <span class="label">Editions fully current</span>
      <span class="value">${current} <small>/ ${activeEditions.length}</small></span>
      <span class="note">no lecture changed upstream since its last sync</span>
    </div>
  </div></section>`;

  /* ---- series table ---- */
  const covCell = (n, total) => {
    const p = Math.round(100 * n / total);
    return `<div class="cov">
      <div class="bar" role="img" aria-label="${p}% coverage"><i style="width:${p}%"></i></div>
      <span class="n">${n}<small>/${total}</small></span></div>`;
  };
  const groupRow = (s) => `<tr class="group"><td colspan="5"><div class="group-line">
      <a class="repo" href="${gh(s.repo)}">${esc(s.repo)}</a>
      <span class="series-title">${esc(s.title)}</span>
      ${s.phase ? `<span class="phase">${esc(s.phase)}</span>` : ""}
      <span class="meta">${s.lectures_total} lectures · en source</span>
    </div></td></tr>`;
  const editionRow = (s, e) => {
    const orphanNote = (e.orphans && e.orphans.length)
      ? ` · <span class="orphan-note">${e.orphans.length} orphan files</span>` : "";
    const siteLink = e.site ? ` · <a href="${esc(e.site)}">site</a>` : "";
    const langCell = `<span class="arrow">↳</span><span class="lang-name">${esc(e.lang_label)} · ${esc(e.lang)}</span>` +
      (e.planned ? "" : `<span class="target"><a href="${gh(e.target_repo)}">${esc(e.target_repo)}</a>${siteLink}${orphanNote}</span>`);
    if (e.planned) {
      return `<tr class="edition planned">
        <td class="lang-cell">${langCell}</td>
        <td>${covCell(0, s.lectures_total)}</td>
        <td class="fresh"><span class="sub">—</span></td>
        <td class="auto"><span class="sub">not scaffolded</span></td>
        <td><span class="chip planned">Planned</span></td>
      </tr>`;
    }
    const staleBadge = e.stale === 0
      ? `<span class="badge good">all current</span>`
      : (e.status === "stalled"
          ? `<span class="badge crit">${e.stale} stale lectures</span>`
          : `<span class="badge warn">${e.stale} stale lecture${e.stale === 1 ? "" : "s"}</span>`);
    const fresh = (e.stale === 0
      ? `${esc(e.last_sync.date)}<span class="sub"><span class="ok">✓ ${esc(e.last_sync.lag)}</span></span>`
      : `${esc(e.last_sync.date)}<span class="sub">${esc(e.last_sync.lag)}</span>`)
      + `<span class="drift">${staleBadge}</span>`;
    const auto = e.automation.wired
      ? `Full<span class="sub">${esc(e.automation.parts)}</span>`
      : `Not wired<span class="sub">${esc(e.automation.parts)}</span>`;
    const chipCls = { healthy: "healthy", drifting: "drifting", stalled: "stalled" }[e.status] || "planned";
    return `<tr class="edition">
      <td class="lang-cell">${langCell}</td>
      <td>${covCell(e.lectures_translated, s.lectures_total)}</td>
      <td class="fresh">${fresh}</td>
      <td class="auto">${auto}</td>
      <td><span class="chip ${chipCls}">${esc(e.status_label)}</span></td>
    </tr>`;
  };
  const table = `<section aria-label="Series and editions">
    <h2>Series &amp; editions</h2>
    <p class="h2-sub">Grouped by English source series — each edition is a synced subrepo of its source. Coverage says how much of the series is translated; activity and stale counts say how current it is — an edition can be complete yet stale. Per-lecture states are on the <a href="sync.html">sync detail</a> page; rollout order follows the <a href="https://github.com/QuantEcon/action-translation/issues/74">Phase 0–3 plan</a> on the <a href="rollout.html">rollout tracker</a>.</p>
    <div class="table-scroll"><table>
      <thead><tr>
        <th scope="col">Edition</th><th scope="col">Coverage</th><th scope="col">Activity · staleness</th>
        <th scope="col">Automation</th><th scope="col">Status</th>
      </tr></thead>
      <tbody>${DATA.sources.map(s => groupRow(s) + s.editions.map(e => editionRow(s, e)).join("")).join("")}</tbody>
    </table></div></section>`;

  /* ---- ladder ---- */
  const ladder = `<section aria-label="Language pipeline">
    <h2>Language pipeline</h2>
    <p class="h2-sub">The expansion ladder: each language advances research → glossary → pilot → production. Gate for launch: a committed human reviewer. Edition-by-edition lifecycle detail is on the <a href="rollout.html">rollout tracker</a>.</p>
    <div class="ladder">${DATA.pipeline.map(st => `
      <div class="stage ${st.cls || ""}">
        <span class="stage-label"><span class="dot"></span>${esc(st.stage)}</span>
        <span class="langs">${st.langs.map(l => `<span class="lang">${esc(l)}</span>`).join("")}</span>
        <span class="ref">${esc(st.ref)}</span>
      </div>`).join("")}</div></section>`;

  document.getElementById("main").innerHTML = tiles + table + ladder;
}

STDash.boot({
  page: "overview",
  render,
  footExtra: (DATA) => DATA.last_sync_note
    ? `<p><b>Activity date.</b> ${STDash.esc(DATA.last_sync_note)}.</p>` : "",
});
</script>
</body>
</html>
